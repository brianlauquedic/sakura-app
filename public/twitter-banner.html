<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #F2EBE0;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Grid texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(42,26,16,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,26,16,0.035) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
  }

  /* Warm glow left */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 0% 50%, rgba(192,57,43,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 500px 400px at 100% 50%, rgba(139,101,32,0.04) 0%, transparent 60%);
    z-index: 0;
  }

  /* ── WaBijin ── */
  .wabijin-wrap {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 380px;
    height: 500px;
    z-index: 2;
    display: flex;
    align-items: flex-end;
  }

  .wabijin-wrap img {
    width: 340px;
    height: auto;
    object-fit: contain;
    object-position: bottom;
    filter: brightness(0.92) contrast(1.05);
    /* Fade edges */
    -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
  }

  /* ── Main content ── */
  .content {
    position: absolute;
    left: 340px;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
  }

  /* Left text block */
  .text-block {
    flex: 1;
  }

  .brand-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 10px;
  }

  .brand-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 64px;
    font-weight: 300;
    color: #2A1A10;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #C0392B;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding-bottom: 4px;
  }

  .tagline {
    font-size: 18px;
    font-weight: 400;
    color: #6B5540;
    letter-spacing: 0.02em;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .tagline strong {
    color: #2A1A10;
    font-weight: 600;
  }

  .tagline em {
    color: #C0392B;
    font-style: normal;
    font-weight: 500;
  }

  /* Pills row */
  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 13px;
    background: #EAE0D0;
    border: 1px solid #C8B89A;
    border-radius: 20px;
    font-size: 11px;
    color: #6B5540;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .pill .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Right stats block */
  .stats-block {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
    padding-left: 40px;
    border-left: 1px solid #C8B89A;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: #C0392B;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    color: #9B8570;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Vertical divider between stats */
  .stat-divider {
    width: 100%;
    height: 1px;
    background: #C8B89A;
  }

  /* Bottom strip */
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, #C0392B 0%, rgba(192,57,43,0.3) 60%, transparent 100%);
    z-index: 4;
  }

  /* Watermark url */
  .url {
    position: absolute;
    bottom: 16px;
    right: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #9B8570;
    letter-spacing: 0.1em;
    z-index: 4;
  }
</style>
</head>
<body>
<div class="banner">

  <!-- WaBijin -->
  <div class="wabijin-wrap">
    <img src="/logo-bijin.png" alt="Sakura" />
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="text-block">
      <div class="brand-row">
        <span class="brand-name">Sakura</span>
        <span class="brand-sub">Solana AI DeFi Advisor</span>
      </div>
      <div class="tagline">
        AI advice you can <em>actually verify.</em><br>
        <strong>Every decision SHA-256 hashed on Solana.</strong>
      </div>
      <div class="pills">
        <div class="pill"><div class="dot" style="background:#C0392B"></div>🔐 Read-only · No Custody</div>
        <div class="pill"><div class="dot" style="background:#10B981"></div>⛓ Onchain Verifiable AI</div>
        <div class="pill"><div class="dot" style="background:#60A5FA"></div>⚡ x402 Agent Payments</div>
        <div class="pill"><div class="dot" style="background:#C9A84C"></div>🤖 Claude Sonnet 4.6</div>
      </div>
    </div>

    <div class="stats-block">
      <div class="stat">
        <div class="stat-num">4</div>
        <div class="stat-label">AI Agents</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">5</div>
        <div class="stat-label">GoPlus Dims</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">8.2<span style="font-size:16px">%</span></div>
        <div class="stat-label">Top APY</div>
      </div>
    </div>
  </div>

  <div class="bottom-strip"></div>
  <div class="url">sakura-ai.app</div>
</div>
</body>
</html>
